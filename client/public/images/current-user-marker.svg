<svg xmlns="http://www.w3.org/2000/svg" width="40" height="40" viewBox="0 0 40 40">
  <!-- Pulsing circle animation -->
  <circle cx="20" cy="20" r="18" fill="rgba(59, 130, 246, 0.2)" stroke="#3b82f6" stroke-width="1">
    <animate attributeName="r" values="15;20;15" dur="2s" repeatCount="indefinite" />
    <animate attributeName="opacity" values="0.6;0.3;0.6" dur="2s" repeatCount="indefinite" />
  </circle>
  
  <!-- Main marker -->
  <circle cx="20" cy="20" r="10" fill="#3b82f6" stroke="white" stroke-width="2" />
  
  <!-- User icon -->
  <path d="M20,12 C17.8,12 16,13.8 16,16 C16,18.2 17.8,20 20,20 C22.2,20 24,18.2 24,16 C24,13.8 22.2,12 20,12 Z M20,22 C16.7,22 14,23.8 14,26 L14,28 L26,28 L26,26 C26,23.8 23.3,22 20,22 Z" fill="white" />
</svg>