# Local backend stack: Express + Redis + Python sentiment.
# MongoDB is on Atlas — server picks up MONGODB_URI from server/.env.
# Client is deployed to Vercel; spin it up locally with `--profile dev`.

services:
  redis:
    image: redis:7-alpine
    container_name: careconnect_redis
    restart: unless-stopped
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - internal

  sentiment:
    build:
      context: ./server/sentiment
      dockerfile: Dockerfile
    container_name: careconnect_sentiment
    restart: unless-stopped
    expose:
      - "5001"
    ports:
      - "5001:5001"   # exposed locally so you can curl it; remove for Fly
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:5001/health').status==200 else 1)"]
      interval: 30s
      timeout: 5s
      start_period: 30s
      retries: 5
    networks:
      - internal

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: careconnect_server
    restart: unless-stopped
    env_file: ./server/.env
    environment:
      NODE_ENV: production
      PORT: 8080
      REDIS_URL: redis://redis:6379
      SENTIMENT_API_URL: http://sentiment:5001
      ORIGIN_URL: ${CLIENT_URL:-http://localhost:3000}
    ports:
      - "8080:8080"
    depends_on:
      redis:
        condition: service_healthy
      sentiment:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3
    networks:
      - internal
      - public

  # Optional: only runs with `docker compose --profile dev up`
  client:
    profiles: ["dev"]
    build:
      context: ./client
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_BASE_URL: ${API_BASE_URL:-http://localhost:8080}
        NEXT_PUBLIC_SOCKET_URL: ${SOCKET_URL:-http://localhost:8080}
    container_name: careconnect_client
    restart: unless-stopped
    env_file: ./client/.env.local
    environment:
      NODE_ENV: production
      NEXTAUTH_URL: ${CLIENT_URL:-http://localhost:3000}
    ports:
      - "3000:3000"
    depends_on:
      server:
        condition: service_healthy
    networks:
      - public

networks:
  internal:
    driver: bridge
  public:
    driver: bridge
